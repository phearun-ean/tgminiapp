<!DOCTYPE html>
<html>
<head>
    <title>Inventory Manager - Bird Nest House</title>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .login-container { max-width: 400px; margin: 100px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .login-container input { width: 100%; padding: 10px; margin: 10px 0; }
        .login-container button { width: 100%; padding: 10px; background: #ff6b00; color: white; border: none; cursor: pointer; }
        .add-form { background: #f5f5f5; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .add-form input, .add-form select { margin: 5px; padding: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #ff6b00; color: white; }
        button { margin: 2px; padding: 5px 10px; cursor: pointer; }
        .logout-btn { float: right; background: #dc3545; color: white; border: none; padding: 8px 16px; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
        .loading { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>
    <div id="loginSection" class="login-container">
        <h2>🔐 Admin Login</h2>
        <input type="email" id="loginEmail" placeholder="Email" autocomplete="off">
        <input type="password" id="loginPassword" placeholder="Password" autocomplete="off">
        <button onclick="login()">Login</button>
        <div id="loginMessage" style="color:red; margin-top:10px;"></div>
    </div>

    <div id="inventorySection" style="display:none;">
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        <h1>📦 Product Inventory Manager</h1>
        
        <div class="add-form">
            <h3>Add New Product</h3>
            <input type="text" id="name" placeholder="Product Name" size="30" autocomplete="off">
            <input type="number" id="price" placeholder="Price" step="0.01" autocomplete="off">
            <input type="text" id="description" placeholder="Description" size="40" autocomplete="off">
            <select id="category" autocomplete="off">
                <option value="bird nest drinks">🥤 Bird Nest Drinks</option>
                <option value="Dried bird nest">🥚 Dried Bird Nest</option>
                <option value="Promotions">🎁 Promotions</option>
            </select>
            <input type="text" id="image" placeholder="Image URL" size="50" autocomplete="off">
            <input type="number" id="stock" placeholder="Stock" value="100" autocomplete="off">
            <button onclick="addProduct()">➕ Add Product</button>
            <div id="message"></div>
        </div>
        
        <h3>Existing Products</h3>
        <div id="productsContainer" class="loading">Loading products...</div>
    </div>

    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDUox5I6RG7sFABAyX_tUXi4rhiX80MDTY",
            authDomain: "birdnesttgminiapp.firebaseapp.com",
            projectId: "birdnesttgminiapp",
            storageBucket: "birdnesttgminiapp.firebasestorage.app",
            messagingSenderId: "1000241241106",
            appId: "1:1000241241106:web:d23c6df3a1723aba100ccb"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        let products = [];
        
        // Login function
        window.login = function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('inventorySection').style.display = 'block';
                    loadProducts();
                })
                .catch((error) => {
                    document.getElementById('loginMessage').innerText = 'Login failed: ' + error.message;
                });
        };
        
        // Logout function
        window.logout = function() {
            auth.signOut().then(() => {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('inventorySection').style.display = 'none';
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
                document.getElementById('loginMessage').innerText = '';
            });
        };
        
        // Check auth state on page load
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('inventorySection').style.display = 'block';
                loadProducts();
            }
        });
        
        // Load products from Firestore
        async function loadProducts() {
            const container = document.getElementById('productsContainer');
            container.innerHTML = '<div class="loading">Loading products...</div>';
            
            try {
                const snapshot = await db.collection("products").orderBy("id").get();
                products = [];
                snapshot.forEach(doc => {
                    const productData = doc.data();
                    productData.docId = doc.id;  // Store the Firestore document ID
                    products.push(productData);
                });
                displayProducts();
            } catch (error) {
                console.error("Error loading products:", error);
                container.innerHTML = '<p style="color:red;">Error loading products: ' + error.message + '</p>';
            }
        }
        
        // Display products in table
        function displayProducts() {
            const container = document.getElementById('productsContainer');
            if (products.length === 0) {
                container.innerHTML = '<p>No products yet. Add your first product above!</p>';
                return;
            }
            
            let html = '<table><th>ID</th><th>Name</th><th>Price</th><th>Category</th><th>Stock</th><th>Actions</th></tr>';
            products.forEach(p => {
                const docId = p.docId;
                html += `
                    <tr>
                        <td>${p.id}</td>
                        <td><input type="text" id="name_${docId}" value="${escapeHtml(p.name)}" style="width:150px;" autocomplete="off"></td>
                        <td><input type="number" id="price_${docId}" value="${p.price}" step="0.01" style="width:80px;" autocomplete="off"></td>
                        <td>
                            <select id="cat_${docId}" autocomplete="off">
                                <option ${p.category === 'bird nest drinks' ? 'selected' : ''} value="bird nest drinks">🥤 Bird Nest Drinks</option>
                                <option ${p.category === 'Dried bird nest' ? 'selected' : ''} value="Dried bird nest">🥚 Dried Bird Nest</option>
                                <option ${p.category === 'Promotions' ? 'selected' : ''} value="Promotions">🎁 Promotions</option>
                            </select>
                        </td>
                        <td><input type="number" id="stock_${docId}" value="${p.stock || 0}" style="width:60px;" autocomplete="off"></td>
                        <td>
                            <button onclick="updateProduct('${docId}')">💾 Save</button>
                            <button onclick="deleteProduct('${docId}')">🗑️ Delete</button>
                        </td>
                    </tr>
                `;
            });
            html += '</table>';
            container.innerHTML = html;
        }
        
        // Add new product
        window.addProduct = async function() {
            const name = document.getElementById('name').value.trim();
            const price = parseFloat(document.getElementById('price').value);
            const description = document.getElementById('description').value.trim();
            const category = document.getElementById('category').value;
            const image = document.getElementById('image').value.trim();
            const stock = parseInt(document.getElementById('stock').value) || 0;
            
            if (!name || isNaN(price)) {
                showMessage('Please enter name and price', 'error');
                return;
            }
            
            // Find the highest existing numeric ID
            let maxId = 0;
            products.forEach(p => {
                if (p.id && p.id > maxId) maxId = p.id;
            });
            const newId = maxId + 1;
            
            try {
                await db.collection("products").add({
                    id: newId,
                    name: name,
                    price: price,
                    description: description,
                    category: category,
                    image: image,
                    stock: stock,
                    createdAt: new Date().toISOString()
                });
                showMessage(`✅ Product "${name}" added successfully!`, 'success');
                clearForm();
                loadProducts();
            } catch (error) {
                showMessage('Error adding product: ' + error.message, 'error');
            }
        };
        
        // Update product
        window.updateProduct = async function(docId) {
            const name = document.getElementById(`name_${docId}`).value;
            const price = parseFloat(document.getElementById(`price_${docId}`).value);
            const category = document.getElementById(`cat_${docId}`).value;
            const stock = parseInt(document.getElementById(`stock_${docId}`).value) || 0;
            
            try {
                await db.collection("products").doc(docId).update({
                    name: name,
                    price: price,
                    category: category,
                    stock: stock
                });
                showMessage('✅ Product updated!', 'success');
                loadProducts();
            } catch (error) {
                showMessage('Error updating product: ' + error.message, 'error');
            }
        };
        
        // Delete product
        window.deleteProduct = async function(docId) {
            if (confirm('Are you sure you want to delete this product?')) {
                try {
                    await db.collection("products").doc(docId).delete();
                    showMessage('✅ Product deleted!', 'success');
                    loadProducts();
                } catch (error) {
                    showMessage('Error deleting product: ' + error.message, 'error');
                }
            }
        };
        
        // Clear form
        function clearForm() {
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            document.getElementById('description').value = '';
            document.getElementById('image').value = '';
            document.getElementById('stock').value = '100';
        }
        
        // Show message
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = msg;
            msgDiv.className = type;
            setTimeout(() => { msgDiv.innerHTML = ''; }, 3000);
        }
        
        // Escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
