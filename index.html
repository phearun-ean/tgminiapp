<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bird Nest House</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff6b00;
            --primary-dark: #e65100;
            --secondary: #4caf50;
            --danger: #f44336;
            --dark: #333;
            --light: #f8f9fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #333);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 0 0 30px 30px;
        }

        .header h1 { font-size: 2.5rem; margin-bottom: 5px; }
        .header p { font-size: 1rem; margin-bottom: 15px; }
        .user-info { background: rgba(255,255,255,0.2); padding: 10px; border-radius: 20px; }

        .tabs {
            display: flex;
            background: #f5f5f5;
            padding: 5px;
            border-radius: 30px;
            margin: 15px;
            gap: 5px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
        }
        .tab.active { background: var(--primary); color: white; }

        .category-filters {
            display: flex;
            gap: 10px;
            margin: 15px;
            overflow-x: auto;
        }
        .filter-btn {
            padding: 8px 18px;
            border-radius: 30px;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
        }
        .filter-btn.active { background: var(--primary); color: white; }

        .section { display: none; padding: 0 15px 15px; }
        .section.active { display: block; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        .menu-item {
            background: #f9f9f9;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .item-image {
            width: 100%;
            height: 180px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }
        .item-image img { width: 100%; height: 100%; object-fit: cover; }
        .item-details { padding: 15px; }
        .item-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .item-name { font-size: 1.2rem; font-weight: 600; }
        .item-price { color: var(--primary); font-weight: 700; font-size: 1.3rem; }
        .item-description { color: #666; font-size: 0.85rem; margin-bottom: 15px; }
        .item-controls { display: flex; justify-content: space-between; align-items: center; }
        .quantity-controls { display: flex; gap: 10px; background: white; border-radius: 25px; padding: 5px; }
        .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: 600; cursor: pointer; }

        .cart-item {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .remove-btn { background: var(--danger); color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; }

        .profile-card {
            background: #f9f9f9;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
        }
        .points-badge {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin: 15px 0;
        }
        .points-value { font-size: 2rem; display: block; }

        .cart-summary {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 15px 20px;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .checkout-btn { background: var(--primary); color: white; border: none; padding: 12px 28px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .empty-cart { text-align: center; padding: 40px; color: #999; }
        .loyalty-banner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 20px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hidden { display: none !important; }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 12px;
            border-radius: 30px;
            text-align: center;
            z-index: 1000;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Name prompt modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 25px;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 1rem;
        }
        .modal-content button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            width: 100%;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Bird Nest House</h1>
        <p>Standards: 5S & Kaizen, Halal, GHPs/HACCP!</p>
        <div class="user-info" id="userInfo">Loading...</div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="menu">🍔 Menu</div>
        <div class="tab" data-tab="cart">🛒 Cart <span id="cartTabCount" class="hidden">(0)</span></div>
        <div class="tab" data-tab="profile">👤 Profile</div>
    </div>

    <div id="menuSection" class="section active">
        <div class="loyalty-banner">
            <div><strong>🎁 Loyalty Rewards</strong><p>Earn 1 point per $1 spent!</p></div>
            <button onclick="switchTab('profile')">View Points</button>
        </div>
        <div class="category-filters" id="categoryFilters">
            <button class="filter-btn active" data-cat="all">All</button>
            <button class="filter-btn" data-cat="bird nest drinks">🥤 Bird Nest Drinks</button>
            <button class="filter-btn" data-cat="Dried bird nest">🥚 Dried Bird Nest</button>
        </div>
        <div id="menuLoader" class="spinner"></div>
        <div id="menuGrid" class="menu-grid"></div>
    </div>

    <div id="cartSection" class="section">
        <div id="cartItems"></div>
        <div id="emptyCart" class="empty-cart">🛒<p>Your cart is empty</p></div>
    </div>

    <div id="profileSection" class="section">
        <div class="profile-card">
            <div class="profile-avatar" id="profileAvatar">👤</div>
            <div class="profile-info" id="profileInfo"></div>
        </div>
        <div class="points-badge" id="pointsDisplay">
            <span class="points-value">0</span>
            <span>Loyalty Points</span>
        </div>
        <h3>📋 Your Orders</h3>
        <div id="orderHistory"></div>
    </div>

    <div id="cartSummary" class="cart-summary hidden">
        <div class="cart-total">Total: <span id="cartTotal">$0.00</span></div>
        <button class="checkout-btn" onclick="checkout()">Checkout →</button>
    </div>

    <div id="toast" class="toast hidden"></div>

        };
        
        // Real-time listener for user points
        window.listenToUserPoints = function(userId, callback) {
            const userRef = doc(db, "users", userId);

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ---------- MENU DATA ----------
        const menuItems = [
            { id: 1, name: "Bird Nest 75ml (general)", description: "100% pure bird's nests, ready to drink", price: 5, category: "bird nest drinks", image: "https://i.postimg.cc/rw3v9gyK/75ml.png" },
            { id: 2, name: "Bird Nest 75ml (6 bottles)", description: "100% pure bird's nests", price: 30, category: "bird nest drinks", image: "https://i.postimg.cc/Dw89sRhZ/75ml_6bottle.png" },
            { id: 3, name: "Bird Nest 75ml (6 bottles original)", description: "Original taste", price: 30, category: "bird nest drinks", image: "https://i.postimg.cc/vZcJ9Cyc/75ml_6bottle_original.png" },
            { id: 4, name: "Bird Nest 75ml (diabetic)", description: "No added sugar", price: 5, category: "bird nest drinks", image: "https://i.postimg.cc/vZcJ9Cyc/75ml_6bottle_original.png" },
            { id: 5, name: "Bird Nest 75ml (6 bottles diabetic)", description: "Diabetic-friendly", price: 30, category: "bird nest drinks", image: "https://i.postimg.cc/vZcJ9Cyc/75ml_6bottle_original.png" },
            { id: 6, name: "Bird Nest 100ml", description: "100% pure", price: 10, category: "bird nest drinks", image: "https://i.postimg.cc/XYpRFtW7/100ml.png" },
            { id: 7, name: "Bird Nest 150ml", description: "100% pure", price: 12, category: "bird nest drinks", image: "https://i.postimg.cc/htfkxNnQ/150ml.png" },
            { id: 8, name: "Bird Nest 200ml", description: "100% pure", price: 15, category: "bird nest drinks", image: "https://i.postimg.cc/8s8mhCxR/200ml.png" },
            { id: 9, name: "Bird Nest 250ml", description: "100% pure", price: 20, category: "bird nest drinks", image: "https://i.postimg.cc/PNGQmq0m/250ml.png" },
            { id: 10, name: "Bird Nest 500ml", description: "100% pure", price: 50, category: "bird nest drinks", image: "https://i.postimg.cc/ZqZH0ChV/500ml.png" },
            { id: 11, name: "Bird Nest 1000ml", description: "100% pure", price: 100, category: "bird nest drinks", image: "https://i.postimg.cc/Wb1Pq1sV/1000ml.png" },
            { id: 12, name: "Bird Nest Grade A (100g)", description: "Dried, shelf-life 3 years", price: 290, category: "Dried bird nest", image: "https://i.postimg.cc/Pq6bSyBf/Grade_A.png" },
            { id: 13, name: "Bird Nest Konkat (100g)", description: "Dried high quality", price: 250, category: "Dried bird nest", image: "https://i.postimg.cc/zXWNCP93/Konkat.png" },
            { id: 14, name: "Bird Nest Num (100g)", description: "Dried", price: 180, category: "Dried bird nest", image: "https://i.postimg.cc/sXwxR035/Bird_s_Nest_Num1_100g.png" },
            { id: 15, name: "Bird Nest Princess (100g)", description: "Premium dried", price: 200, category: "Dried bird nest", image: "" }
        ];

        // ---------- USER DATA (with fallback prompt) ----------
        let user = {
            id: 'guest',
            firstName: 'Guest',
            lastName: '',
            username: '',
            photoUrl: null
        };

        // Try to get from Telegram
        function getTelegramUser() {
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                const u = tg.initDataUnsafe.user;
                return {
                    id: u.id || 'guest',
                    firstName: u.first_name || 'Guest',
                    lastName: u.last_name || '',
                    username: u.username || '',
                    photoUrl: u.photo_url || null
                };
            }
            return null;
        }

        let tgUser = getTelegramUser();
        if (tgUser && tgUser.id !== 'guest') {
            user = tgUser;
            localStorage.setItem('birdnest_user', JSON.stringify(user));
        } else {
            let saved = localStorage.getItem('birdnest_user');
            if (saved) {
                user = JSON.parse(saved);
            } else {
                // Show name prompt
                showNamePrompt();
            }
        }

        function showNamePrompt() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>👋 Welcome!</h3>
                    <p>Please enter your name so we know who's ordering:</p>
                    <input type="text" id="customerName" placeholder="Your name" autocomplete="off">
                    <button id="saveNameBtn">Continue</button>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('saveNameBtn').onclick = () => {
                let name = document.getElementById('customerName').value.trim();
                if (name) {
                    user.firstName = name;
                    user.userName = name;
                    user.id = 'user_' + Date.now();
                    localStorage.setItem('birdnest_user', JSON.stringify(user));
                    modal.remove();
                    startApp(); // start the app after name is set
                } else {
                    alert('Please enter your name');
                }
            };
        }

        // ---------- APP STATE ----------
        let cart = [];
        let loyaltyPoints = 0;
        let orderHistory = [];
        let currentCategory = "all";

        // Helper functions
        function saveData() {
            localStorage.setItem(`cart_${user.id}`, JSON.stringify(cart));
            localStorage.setItem(`points_${user.id}`, loyaltyPoints);
            localStorage.setItem(`orders_${user.id}`, JSON.stringify(orderHistory));
        }

        function loadData() {
            let savedCart = localStorage.getItem(`cart_${user.id}`);
            let savedPoints = localStorage.getItem(`points_${user.id}`);
            let savedOrders = localStorage.getItem(`orders_${user.id}`);
            if (savedCart) cart = JSON.parse(savedCart);
            if (savedPoints) loyaltyPoints = parseInt(savedPoints);
            if (savedOrders) orderHistory = JSON.parse(savedOrders);
            updateCartCount();
            updateCartDisplay();
        }

        function updateCartCount() {
            let count = cart.length;
            let span = document.getElementById('cartTabCount');
            if (count > 0) {
                span.textContent = `(${count})`;
                span.classList.remove('hidden');
            } else {
                span.classList.add('hidden');
            }
        }

        function updateCartDisplay() {
            let cartDiv = document.getElementById('cartItems');
            let emptyCart = document.getElementById('emptyCart');
            let summary = document.getElementById('cartSummary');
            if (cart.length === 0) {
                cartDiv.innerHTML = '';
                emptyCart.classList.remove('hidden');
                summary.classList.add('hidden');
                return;
            }
            emptyCart.classList.add('hidden');
            summary.classList.remove('hidden');
            // group items
            let groups = {};
            cart.forEach(item => { groups[item.id] = groups[item.id] || { item, count: 0 }; groups[item.id].count++; });
            cartDiv.innerHTML = Object.values(groups).map(g => `
                <div class="cart-item">
                    <div><b>${g.item.name}</b><br>$${g.item.price} x ${g.count} = $${(g.item.price * g.count).toFixed(2)}</div>
                    <button class="remove-btn" onclick="removeItem(${g.item.id})">Remove</button>
                </div>
            `).join('');
            let total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cartTotal').textContent = `$${total.toFixed(2)}`;
        }

        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartCount();
            updateCartDisplay();
            saveData();
            showToast("Item removed");
        }

        function addToCart(id) {
            let qtySpan = document.getElementById(`qty_${id}`);
            let qty = parseInt(qtySpan.textContent);
            if (isNaN(qty) || qty < 1) qty = 1;
            let item = menuItems.find(i => i.id === id);
            for (let i = 0; i < qty; i++) cart.push({ ...item });
            qtySpan.textContent = '0';
            updateCartCount();
            updateCartDisplay();
            saveData();
            showToast(`Added ${qty} x ${item.name}`);
            tg.HapticFeedback.impactOccurred('light');
        }

        function adjustQuantity(id, delta) {
            let span = document.getElementById(`qty_${id}`);
            let val = parseInt(span.textContent) + delta;
            if (val < 0) val = 0;
            if (val > 99) val = 99;
            span.textContent = val;
        }

        function renderMenu() {
            let grid = document.getElementById('menuGrid');
            let loader = document.getElementById('menuLoader');
            loader.classList.remove('hidden');
            setTimeout(() => {
                loader.classList.add('hidden');
                let filtered = currentCategory === 'all' ? menuItems : menuItems.filter(i => i.category === currentCategory);
                if (filtered.length === 0) {
                    grid.innerHTML = '<div style="text-align:center; padding:40px;">No items</div>';
                    return;
                }
                grid.innerHTML = filtered.map(item => {
                    let imgHtml = (item.image && item.image.startsWith('http')) ? `<img src="${item.image}" onerror="this.parentElement.innerHTML='🍽️'">` : '🍽️';
                    return `
                        <div class="menu-item">
                            <div class="item-image">${imgHtml}</div>
                            <div class="item-details">
                                <div class="item-header"><span class="item-name">${item.name}</span><span class="item-price">$${item.price}</span></div>
                                <div class="item-description">${item.description}</div>
                                <div class="item-controls">
                                    <div class="quantity-controls">
                                        <button class="qty-btn" onclick="adjustQuantity(${item.id}, -1)">-</button>
                                        <span class="qty-value" id="qty_${item.id}">0</span>
                                        <button class="qty-btn" onclick="adjustQuantity(${item.id}, 1)">+</button>
                                    </div>
                                    <button class="add-btn" onclick="addToCart(${item.id})">Add • $${item.price}</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }, 200);
        }


        // NEW START: Modified checkout with Firebase save
        async function checkout() {
            if (cart.length === 0) { showToast('Cart empty'); return; }
            let total = cart.reduce((s, i) => s + i.price, 0);
            let pointsEarned = Math.floor(total);
            let orderId = 'ORD_' + user.id + '_' + Date.now();
            let order = {
                orderId: orderId,
                userId: user.id,
                userName: user.firstName + (user.lastName ? ' ' + user.lastName : ''),
                username: user.username || '',
                items: cart.map(i => ({ name: i.name, price: i.price })),
                total: total,
                pointsEarned: pointsEarned,
                status: 'Confirmed',
                timestamp: new Date().toISOString()
            };
            
            // Update local state
            orderHistory.unshift({
                id: orderId,
                date: new Date().toLocaleString(),
                items: cart.map(i => i.name),
                total: total,
                status: 'Confirmed',
                pointsEarned: pointsEarned
            });
            loyaltyPoints += pointsEarned;
            
            // Save to Firestore
            if (window.saveOrderToFirestore) {
                let saved = await window.saveOrderToFirestore(order);
                if (saved) {
                    console.log("Order persisted to Firebase");
                }
            }
            
            // Update user points in Firestore
            if (window.updateUserPointsInFirestore) {
                await window.updateUserPointsInFirestore(user.id, loyaltyPoints);
            }
            
            // Prepare data for Telegram bot
            let orderDataForBot = {
                userId: user.id,
                userName: user.firstName + (user.lastName ? ' ' + user.lastName : ''),
                username: user.username || '',
                firstName: user.firstName,
                lastName: user.lastName || '',
                items: cart.map(i => ({ name: i.name, price: i.price })),
                total: total.toFixed(2),
                points: pointsEarned,
                totalPoints: loyaltyPoints,
                timestamp: new Date().toISOString()
            };
            
            cart = [];
            updateCartCount();
            updateCartDisplay();
            updateProfileInfo();
            saveData();
            tg.sendData(JSON.stringify(orderDataForBot));
            showToast(`✅ Order placed! Earned ${pointsEarned} points`);
            tg.HapticFeedback.notificationOccurred('success');
            switchTab('profile');
        }
        // NEW END

        function updateProfileInfo() {
            document.getElementById('profileInfo').innerHTML = `
                <p><strong>${user.firstName} ${user.lastName}</strong></p>
                <p>@${user.username || 'no username'}</p>
            `;
            document.querySelector('#pointsDisplay .points-value').textContent = loyaltyPoints;
            let historyDiv = document.getElementById('orderHistory');
            if (orderHistory.length === 0) historyDiv.innerHTML = '<p>No orders yet.</p>';
            else historyDiv.innerHTML = orderHistory.map(o => `
                <div style="background:#f9f9f9; border-radius:15px; padding:15px; margin-bottom:10px;">
                    <b>${o.id}</b> - ${o.date}<br>
                    ${o.items.slice(0,3).join(', ')}${o.items.length>3?'...':''}<br>
                    Total: $${o.total.toFixed(2)}<br>
                    Earned ${o.pointsEarned} points
                </div>
            `).join('');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(`${tabName}Section`).classList.add('active');
            if (tabName === 'cart') updateCartDisplay();
            if (tabName === 'profile') updateProfileInfo();
        }

        function showToast(msg) {
            let toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2000);
        }

        function startApp() {
            document.getElementById('userInfo').textContent = `Welcome, ${user.firstName}!`;
            if (user.photoUrl) document.getElementById('profileAvatar').innerHTML = `<img src="${user.photoUrl}" style="width:100%; border-radius:50%;">`;
            loadData();
            renderMenu();
            updateProfileInfo();
            // attach tab listeners
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => switchTab(tab.getAttribute('data-tab')));
            });
            // category filters
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.getAttribute('data-cat');
                    renderMenu();
                });
            });
        }

        // If user is already set (from Telegram or localStorage), start immediately
        if (user.id !== 'guest') {
            startApp();
        }
        // else, the prompt will call startApp() after name is entered
    </script>
</body>
</html>
